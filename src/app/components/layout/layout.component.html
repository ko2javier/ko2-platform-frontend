<div class="shell">
  <div class="main">
    <header class="topbar">
      <span class="platform-name">KO2 Platform</span>
      @if (weather) {
        <div class="weather-badge">
          <span class="weather-icon">{{ weatherIcon }}</span>
          <span class="weather-city">Santander</span>
          <strong class="weather-temp">{{ weather.current_weather.temperature }}°C</strong>
        </div>
      }
      <div class="topbar-actions">

        <!-- Architecture CTA -->
        <button class="btn-architecture" (click)="showAbout = true">
          Architecture
        </button>

        <!-- Segmented language control -->
        <div class="seg-control">
          <div class="seg-pill" [style.transform]="'translateX(calc(' + langIndex + ' * 100%))'"></div>
          @for (lang of langs; track lang) {
            <button class="seg-btn" [class.active]="currentLang === lang" (click)="setLang(lang)">
              {{ lang.toUpperCase() }}
            </button>
          }
        </div>

        <!-- User pill: avatar + name + theme toggle + about + logout -->
        <div class="user-pill">
          <span class="user-avatar">{{ username.charAt(0).toUpperCase() }}</span>
          <span class="user-name">{{ username }}</span>
          <button class="btn-theme" (click)="toggleTheme()"
            [title]="(isDark ? 'NAV.THEME_LIGHT' : 'NAV.THEME_DARK') | translate">
            {{ isDark ? '☀️' : '🌙' }}
          </button>
          <span class="pill-sep"></span>
          <button class="btn-logout" (click)="logout()">{{ 'NAV.LOGOUT' | translate }}</button>
        </div>

      </div>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>

<app-about-panel [isOpen]="showAbout" (closePanel)="showAbout = false" />
