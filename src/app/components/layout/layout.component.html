<div class="shell">
  <aside class="sidebar">
    <div class="brand">KO2</div>
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">&#9729;</span> {{ 'NAV.WEATHER' | translate }}
      </a>
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">&#8644;</span> {{ 'NAV.CURRENCY' | translate }}
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-about" (click)="showAbout = true" [title]="'NAV.ABOUT' | translate">
        <span class="about-icon">ℹ</span>
        <span class="about-label">{{ 'NAV.ABOUT' | translate }}</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="platform-name">KO2 Platform</span>
      <div class="topbar-actions">

        <!-- Segmented language control -->
        <div class="seg-control">
          <div class="seg-pill" [style.transform]="'translateX(calc(' + langIndex + ' * 100%))'"></div>
          @for (lang of langs; track lang) {
            <button class="seg-btn" [class.active]="currentLang === lang" (click)="setLang(lang)">
              {{ lang.toUpperCase() }}
            </button>
          }
        </div>

        <!-- User pill: avatar + name + theme toggle + logout -->
        <div class="user-pill">
          <span class="user-avatar">{{ username.charAt(0).toUpperCase() }}</span>
          <span class="user-name">{{ username }}</span>
          <button class="btn-theme" (click)="toggleTheme()"
            [title]="(isDark ? 'NAV.THEME_LIGHT' : 'NAV.THEME_DARK') | translate">
            {{ isDark ? '☀️' : '🌙' }}
          </button>
          <span class="pill-sep"></span>
          <button class="btn-logout" (click)="logout()">{{ 'NAV.LOGOUT' | translate }}</button>
        </div>

      </div>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>

<app-about-panel [isOpen]="showAbout" (closePanel)="showAbout = false" />
